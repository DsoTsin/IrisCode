[package]
name = "apple-developer"
version = "0.0.1"
authors = ["zhouqin <zhouqin@haroyo.com>"]
edition = "2021"
license = "CUSTOM"
description = "Apple Developer Service"
keywords = ["gpu", "profiler", "mobile", "android", "apple"]
categories = ["gpu", "profiler"]
include = ["/src/**/*", "/Cargo.toml", "/LICENSE", "/README.md"]
homepage = "https://haroyo.com"
documentation = "https://docs.rs/apple-developer"
repository = "https://github.com/DsoTsin/apple-developer-rs"
readme = "README.md"
resolver = "2"
# Nightly toolchain
rust-version = "1.56"

[dependencies]
thiserror = "1.0"
libc = "0.2.124"
md-5 = "0.10.1"
json = "0.12.4"
base64 = "0.13.0"
plist = "1.8"
serde_derive = "1.0.34"
serde = { version = "1.0.130", features = ["derive"] }
ureq = { version = "2.4.0", features = ["tls", "native-certs", "native-tls"] }
native-tls = "0.2.10"
rustls = { version = "0.20.0", features = [ "dangerous_configuration" ] }
webpki-roots = { version = "0.22", optional = true }
rustls-native-certs = { version = "0.6" }
memmodpp = { path = "../memory_module_pp" }

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3.9", features=["iphlpapi","heapapi","fileapi","winbase","userenv","handleapi"] }

[build-dependencies]
cc = "1.0"